workflows:
  android-release:
    name: Build Android Release APK
    environment:
      java: 21
      node: 22
      groups:
        - keystore_credentials
        - api_keys # Add GEMINI_API_KEY, GOOGLE_SERVICES_JSON_BASE64, and PRODUCTION_API_URL here
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Angular
        script: |
          npm run build
          if [ -f "dist/app/browser/index.csr.html" ] && [ ! -f "dist/app/browser/index.html" ]; then
            cp dist/app/browser/index.csr.html dist/app/browser/index.html
          fi
      - name: Generate Assets
        script: npx capacitor-assets generate --android
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Fix Gradle Wrapper
        script: |
          cd android
          rm -f gradle/wrapper/gradle-wrapper.jar
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.14.3/gradle/wrapper/gradle-wrapper.jar
      - name: Decode Keystore and Google Services
        script: |
          cd android/app
          echo "$ANDROID_KEYSTORE_BASE64" | tr -d '\n' | base64 -d > my-release-key.jks
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "$GOOGLE_SERVICES_JSON_BASE64" | tr -d '\n' | base64 -d > google-services.json
          fi
      - name: Build Signed APK
        script: |
          cd android
          chmod +x gradlew
          export KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD
          export KEY_ALIAS=$ANDROID_KEY_ALIAS
          export KEY_PASSWORD=$ANDROID_KEY_PASSWORD
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
